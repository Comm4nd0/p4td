name: Store Screenshots

# Generate framed, captioned App Store + Play Store screenshots and upload them —
# no local Mac required. Manually triggered.
#
# Required repository secrets:
#   DEMO_EMAIL, DEMO_PASSWORD                     - the seeded demo owner account
#   PLAY_STORE_SERVICE_ACCOUNT_JSON               - Play upload (already used by deploy)
#   ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8         - App Store Connect API key (.p8 contents)
#
# Run `python manage.py seed_demo_data ...` against the backend first so the demo
# account has a dog + media (see my_app/SCREENSHOTS.md).

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Which platforms to generate"
        type: choice
        options: ["both", "ios", "android"]
        default: "both"
      upload:
        description: "Upload to the stores (otherwise artifacts only)"
        type: boolean
        default: true

env:
  LOCALE: en-GB

jobs:
  ios:
    if: ${{ inputs.platforms == 'both' || inputs.platforms == 'ios' }}
    runs-on: macos-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: my_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Tooling (fastlane + ImageMagick for frameit)
        run: |
          brew install imagemagick || true
          gem install fastlane --no-document
      - name: Install dependencies
        run: flutter pub get
      - name: Fetch device frames + caption font
        run: |
          mkdir -p fastlane/fonts
          curl -fsSL -o fastlane/fonts/Nunito-Bold.ttf \
            https://raw.githubusercontent.com/google/fonts/main/ofl/nunito/static/Nunito-Bold.ttf \
            || curl -fsSL -o fastlane/fonts/Nunito-Bold.ttf \
            https://github.com/google/fonts/raw/main/ofl/nunito/Nunito%5Bwght%5D.ttf
          (cd fastlane && fastlane frameit download_frames || true)
      - name: Provide GoogleService-Info.plist (Firebase build input)
        # Screenshots never initialise Firebase, so a stub satisfies the Xcode
        # build. If you add the real plist as a secret, it's used instead.
        env:
          GS_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GS_PLIST" ]; then
            printf '%s' "$GS_PLIST" > ios/Runner/GoogleService-Info.plist
          else
            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
              echo '<plist version="1.0"><dict>'
              echo '<key>API_KEY</key><string>stub</string>'
              echo '<key>GCM_SENDER_ID</key><string>000000000000</string>'
              echo '<key>BUNDLE_ID</key><string>uk.co.paws4thoughtdogs.paws4thoughtdogs</string>'
              echo '<key>PROJECT_ID</key><string>stub</string>'
              echo '<key>STORAGE_BUCKET</key><string>stub.appspot.com</string>'
              echo '<key>GOOGLE_APP_ID</key><string>1:000000000000:ios:0000000000000000</string>'
              echo '<key>IS_GCM_ENABLED</key><false/>'
              echo '</dict></plist>'
            } > ios/Runner/GoogleService-Info.plist
          fi
      - name: Boot iOS simulator (maintained action — reliable full boot)
        uses: futureware-tech/simulator-action@v3
        with:
          model: "iPhone 16 Pro Max"
      - name: Capture iOS screenshots
        timeout-minutes: 20
        env:
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
          # The simulator-action step above already booted the device, so the
          # script must not try to boot/poll it again.
          IOS_SKIP_BOOT: "1"
          # Only the 6.9" iPhone is required; add an iPad line if you ship iPad.
          IOS_DEVICES_ENV: |
            iPhone 16 Pro Max
        run: ./tool/screenshots.sh ios
      - name: Frame + caption
        run: (cd fastlane && fastlane frame)
      - name: Upload to App Store Connect
        if: ${{ inputs.upload }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p fastlane/keys
          printf '%s' "${{ secrets.ASC_KEY_P8 }}" > fastlane/keys/asc.p8
          export ASC_KEY_PATH="$PWD/fastlane/keys/asc.p8"
          (cd fastlane && fastlane upload_ios)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-screenshots
          path: my_app/fastlane/screenshots/

  android:
    if: ${{ inputs.platforms == 'both' || inputs.platforms == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: my_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Tooling (fastlane + ImageMagick for frameit)
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          gem install fastlane --no-document
      - name: Install dependencies
        run: flutter pub get
      - name: Create google-services.json (required by Gradle google-services plugin)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Fetch device frames + caption font
        run: |
          mkdir -p fastlane/fonts
          curl -fsSL -o fastlane/fonts/Nunito-Bold.ttf \
            https://raw.githubusercontent.com/google/fonts/main/ofl/nunito/static/Nunito-Bold.ttf \
            || curl -fsSL -o fastlane/fonts/Nunito-Bold.ttf \
            https://github.com/google/fonts/raw/main/ofl/nunito/Nunito%5Bwght%5D.ttf
          (cd fastlane && fastlane frameit download_frames || true)
      - name: Enable KVM (emulator acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: Capture Android screenshots (phone)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          working-directory: my_app
          # Emulator is already running here (device "emulator-5554").
          # NOTE: keep each command on one line — the action's shell does not
          # handle backslash line-continuations.
          script: |
            export SCREENSHOT_OUT=build/screenshots/android-phone
            flutter drive --driver=test_driver/integration_test.dart --target=integration_test/screenshots_test.dart -d emulator-5554 --dart-define=DEMO_EMAIL="$DEMO_EMAIL" --dart-define=DEMO_PASSWORD="$DEMO_PASSWORD"
            mkdir -p "fastlane/metadata/android/${LOCALE:-en-GB}/images/phoneScreenshots"
            cp build/screenshots/android-phone/*.png "fastlane/metadata/android/${LOCALE:-en-GB}/images/phoneScreenshots/" || true
      - name: Frame + caption
        run: (cd fastlane && fastlane frame)
      - name: Upload to Play Console
        if: ${{ inputs.upload }}
        run: |
          printf '%s' '${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}' > fastlane/play.json
          export SUPPLY_JSON_KEY="$PWD/fastlane/play.json"
          (cd fastlane && fastlane upload_android)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-screenshots
          path: my_app/fastlane/metadata/android/
