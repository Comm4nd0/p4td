# Production Docker Compose for Hetzner CX22
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RDS_DB_NAME:-p4td}
      POSTGRES_USER: ${RDS_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${RDS_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RDS_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - RDS_HOSTNAME=db
    depends_on:
      db:
        condition: service_healthy
    # Media is a host bind-mount: the separate Caddy container serves it from the
    # same host directory (root * /srv/p4td-media). Do NOT switch this to a named
    # volume — Caddy would then serve an empty/stale directory.
    volumes:
      - ./media:/app/media
    # The host's Caddy container reverse-proxies to 172.17.0.1:8000 (Caddy is on
    # a DIFFERENT Docker network), so the app port MUST be published on the host.
    # Bind it to the docker0 gateway only: Caddy can reach it, but it is NOT
    # exposed on the public interface (the server has no firewall). See
    # DEPLOYMENT.md. Do not remove this, and do not move media to a named volume.
    ports:
      - "172.17.0.1:8000:8000"
    healthcheck:
      # Send X-Forwarded-Proto so SECURE_SSL_REDIRECT doesn't 301 this loopback
      # check to https (which nothing serves on localhost).
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen(u.Request('http://localhost:8000/healthz/', headers={'X-Forwarded-Proto':'https'}), timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    # Single-line list form: YAML folding can't split the gunicorn invocation
    # across shell lines (a folded `>` scalar did, breaking the container).
    command: ["sh", "-c", "python manage.py migrate --noinput && gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120 --max-requests 1000 --max-requests-jitter 100 p4td_backend.wsgi:application"]

volumes:
  postgres_data:
