# Production Docker Compose for Hetzner CX22
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RDS_DB_NAME:-p4td}
      POSTGRES_USER: ${RDS_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${RDS_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RDS_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - RDS_HOSTNAME=db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 2 p4td_backend.wsgi:application"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - media_data:/srv/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
