# Production Docker Compose for Hetzner CX22
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RDS_DB_NAME:-p4td}
      POSTGRES_USER: ${RDS_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${RDS_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RDS_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - RDS_HOSTNAME=db
    depends_on:
      db:
        condition: service_healthy
    # Media lives in a named volume (single source of truth — see I17). If Caddy
    # runs as a separate service/container, it must mount this same volume at
    # /srv/media (read-only) to serve /media/* (see Caddyfile).
    volumes:
      - media_data:/app/media
    # NOT published to the host: Caddy reaches the app at web:8000 over the
    # internal Docker network, so there's no reason to expose 8000 externally
    # (I8). To debug locally, temporarily add: ports: ["127.0.0.1:8000:8000"].
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120
                      --max-requests 1000 --max-requests-jitter 100
                      p4td_backend.wsgi:application"

volumes:
  postgres_data:
  media_data:
