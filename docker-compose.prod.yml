# Production Docker Compose for P4TD
# Works with the shared reverse proxy in ../reverse-proxy/
#
# Prerequisites:
#   - Shared network exists: docker network create caddy-net
#   - Reverse proxy is running: cd ../reverse-proxy && docker compose up -d
#
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RDS_DB_NAME:-p4td}
      POSTGRES_USER: ${RDS_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${RDS_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RDS_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: p4td-web
    restart: unless-stopped
    env_file: .env
    environment:
      - RDS_HOSTNAME=db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    networks:
      - default
      - caddy-net
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 2 p4td_backend.wsgi:application"

volumes:
  postgres_data:
  media_data:

networks:
  caddy-net:
    external: true
    name: caddy-net
