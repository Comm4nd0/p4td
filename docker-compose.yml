# Docker Compose for local development with production-like environment
# Run: docker-compose up

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: p4td
      POSTGRES_USER: postgres
      # Sourced from the environment (.env); defaults to 'postgres' for a
      # throwaway local DB. No real credential is committed here.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bind to loopback only so the dev DB isn't reachable from the LAN.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=dev-secret-key-for-local-docker-only
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=paws4thoughtdogs.com,www.paws4thoughtdogs.com,localhost,127.0.0.1
      - RDS_HOSTNAME=db
      - RDS_DB_NAME=p4td
      - RDS_USERNAME=postgres
      # - RDS_PASSWORD from .env
      - RDS_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/app/media
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 p4td_backend.wsgi:application"

volumes:
  postgres_data:
